databases:
  - name: ghost-db
    databaseName: ghost
    user: ghost
    type: mysql
services:
  - type: web
    name: ghost
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: database__client
        value: mysql
      - key: database__connection__host
        fromDatabase:
          name: ghost-db
          property: host
      - key: database__connection__database
        fromDatabase:
          name: ghost-db
          property: database
      - key: database__connection__user
        fromDatabase:
          name: ghost-db
          property: user
      - key: database__connection__password
        fromDatabase:
          name: ghost-db
          property: password
      - key: url
        value: https://ghost.example.com
